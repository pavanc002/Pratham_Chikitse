<!DOCTYPE html>

<html class="light" lang="kn"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>

        }

            0% { box-shadow: 0 0 0 0 rgba(0, 109, 55, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 109, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 109, 55, 0); }
        }

          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-fixed-variant": "#8e130c",
                      "surface-variant": "#d7e4f3",
                      "inverse-surface": "#26323d",
                      "tertiary-container": "#965d00",
                      "secondary-fixed-dim": "#61de8a",
                      "secondary": "#006d37",
                      "on-secondary-container": "#007239",
                      "on-surface-variant": "#59413d",

                      "on-tertiary-container": "#ffe7cf",
                      "inverse-on-surface": "#e7f2ff",
                      "error": "#ba1a1a",
                      "primary": "#9e2016",
                      "outline-variant": "#e1bfb9",

              "spacing": {
                      "tap-target-min": "48px",
                      "tile-size": "80px",
                      "margin-mobile": "16px",
                      "base": "8px",
                      "gutter-mobile": "12px"

              "fontFamily": {
                      "label-lg": ["Roboto"],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Top App Bar - Using Shared Component Specs -->
<header class="flex justify-between items-center w-full px-margin-mobile h-tap-target-min fixed top-0 z-50 bg-surface dark:bg-surface-container-high border-b-2 border-outline-variant dark:border-outline">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="menu">menu</span>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed">ಪ್ರಥಮ ಚಿಕಿತ್ಸೆ</h1>
</div>
<span class="material-symbols-outlined text-primary" data-icon="account_circle">account_circle</span>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-20 pb-24 px-margin-mobile flex flex-col items-center justify-center">
<!-- Instructional Heading -->
<div class="text-center mb-8">
<h2 class="font-headline-lg text-headline-lg mb-2 text-on-background">ನಿಮ್ಮ ಭಾಷೆಯನ್ನು ಆರಿಸಿ</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Choose your language</p>
</div>
<!-- Central Medical Illustration -->
<div class="w-full max-w-sm aspect-square mb-10 flex items-center justify-center overflow-hidden rounded-xl bg-surface-container-low border border-outline-variant">
<img alt="First Aid Illustration" class="w-full h-full object-cover" data-alt="A clean, minimalist medical illustration featuring a stylized first aid kit with a prominent white cross and a stethoscope resting gracefully beside it. The art style is modern digital vector with smooth gradients and high contrast, set against a bright, airy background of soft whites and cool blues. The lighting is bright and professional, evoking a sense of calm reliability and immediate medical assistance, adhering to a sophisticated health-oriented design aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA3gjVe3vUjjsL8Y5e_rwnFI0geUKXKFtD8nol20g2MGWj_gtNJjMALpl1IlBWvAICVmKs9OWrDkgEauzomvGWt7SZUvPwy4KbEoQhuJldIfnJV45rLg2vXWpptsD0XwOdsXLNgmyjuX5v8GBP_eRrcffcgrUe9J_YhxFfVSK9Wu0Ep8JHnblWKEGM7O_xhKxPI9MpS9Yay9zIhvQ7sV6YTDuMFl2RGs26zyzB8zqVTFQavW_AXG1ylxvqjxyxG2WnXpEgT7DwpdjN4"/>
</div>
<!-- Language Selection Buttons - Bento-style Layout -->
<div class="w-full max-w-md grid grid-cols-1 gap-4 mb-12">
<!-- Kannada Button (Primary Action) -->
<button class="flex items-center justify-between h-[72px] px-6 bg-primary text-on-primary rounded-xl active:scale-95 transition-transform border-2 border-primary shadow-lg group">
<div class="flex flex-col items-start">
<span class="font-headline-md text-headline-md leading-tight">ಕನ್ನಡ</span>
<span class="font-label-lg text-label-lg opacity-80">KANNADA</span>
</div>
<span class="material-symbols-outlined text-3xl" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</button>
<!-- English Button (Secondary Action) -->
<button class="flex items-center justify-between h-[72px] px-6 bg-surface border-2 border-primary text-primary rounded-xl active:scale-95 transition-transform group">
<div class="flex flex-col items-start">
<span class="font-headline-md text-headline-md leading-tight">ENGLISH</span>
<span class="font-label-lg text-label-lg text-on-surface-variant">ಇಂಗ್ಲಿಷ್</span>
</div>
<span class="material-symbols-outlined text-3xl" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Audio Guidance FAB -->
<button class="fixed bottom-28 right-6 w-[64px] h-[64px] bg-secondary text-on-secondary rounded-full flex items-center justify-center pulse-glow z-40 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="volume_up">volume_up</span>
</button>
</main>
<!-- Persistent 'Call 108' Bar -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-[#c0392b] h-20 flex items-center justify-center active:bg-on-primary-fixed-variant transition-colors cursor-pointer shadow-[0_-4px_20px_rgba(0,0,0,0.2)]">
<div class="flex items-center gap-4">
<div class="bg-white text-[#c0392b] rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined text-3xl" data-icon="call" data-weight="fill" style="font-variation-settings: 'FILL' 1;">call</span>
</div>
<div class="flex flex-col">
<span class="font-emergency-num text-emergency-num text-white tracking-widest leading-none">CALL 108</span>
<span class="text-white font-label-lg text-label-lg opacity-90 uppercase tracking-tighter">Emergency Support</span>
</div>
</div>
</footer>
</body></html>

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top App Bar - Simplified for Onboarding -->
<header class="flex justify-between items-center w-full px-margin-mobile h-tap-target-min bg-surface border-b-2 border-outline-variant">
<h1 class="font-headline-lg text-headline-lg font-bold text-primary">ಪ್ರಥಮ ಚಿಕಿತ್ಸೆ</h1>
<button class="material-symbols-outlined text-primary p-2 hover:bg-surface-container-highest rounded-full transition-colors">
            help_outline
        </button>
</header>
<main class="flex-grow flex flex-col px-margin-mobile pt-8 pb-12 max-w-md mx-auto w-full">
<!-- Hero Section / Context -->
<div class="mb-10 text-center">
<div class="w-24 h-24 bg-primary-container rounded-full mx-auto flex items-center justify-center mb-6 shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-5xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">ನೋಂದಾಯಿಸಿ</h2>
<p class="font-body-md text-body-md text-on-surface-variant">ತುರ್ತು ಸಂದರ್ಭದಲ್ಲಿ ಉತ್ತಮ ಚಿಕಿತ್ಸೆ ಪಡೆಯಲು ನಿಮ್ಮ ಮಾಹಿತಿಯನ್ನು ನೀಡಿ.</p>
</div>
<!-- Registration Form -->
<div class="space-y-6">
<!-- Name Field -->
<div class="relative group">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-2 ml-1" for="name">ಪೂರ್ಣ ಹೆಸರು (Full Name)</label>
<div class="flex items-center border-2 border-outline rounded-xl px-4 py-3 bg-surface focus-within:border-primary transition-all">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary mr-3">person</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 font-body-lg text-body-lg placeholder:text-outline-variant" id="name" name="name" placeholder="ನಿಮ್ಮ ಹೆಸರನ್ನು ನಮೂದಿಸಿ" type="text"/>
</div>
</div>
<!-- Phone Number Field -->
<div class="relative group">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-2 ml-1" for="phone">ಫೋನ್ ಸಂಖ್ಯೆ (Phone Number)</label>
<div class="flex items-center border-2 border-outline rounded-xl px-4 py-3 bg-surface focus-within:border-primary transition-all">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary mr-3">call</span>
<div class="flex items-center border-r border-outline-variant pr-3 mr-3">
<span class="font-emergency-num text-label-lg text-on-surface">+91</span>
</div>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 font-emergency-num text-body-lg placeholder:text-outline-variant" id="phone" name="phone" placeholder="10 ಅಂಕಿಗಳ ಸಂಖ್ಯೆ" type="tel"/>
</div>
</div>
</div>
<!-- Action Buttons - The Panic Zone -->
<div class="mt-auto pt-10 space-y-4">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-headline-md text-headline-md flex items-center justify-center active:scale-95 transition-transform shadow-md">
<span>ನೋಂದಾಯಿಸಿ (Register)</span>
<span class="material-symbols-outlined ml-2">chevron_right</span>
</button>
<button class="w-full h-14 border-2 border-primary text-primary rounded-xl font-headline-md text-headline-md flex items-center justify-center active:scale-95 transition-transform bg-transparent">
                ನಂತರ ಮಾಡಿ (Skip for now)
            </button>
</div>
<!-- Privacy Disclaimer -->
<div class="mt-8 text-center px-4">
<p class="font-body-md text-[12px] leading-relaxed text-on-surface-variant opacity-80">
<span class="material-symbols-outlined text-[14px] align-middle mr-1">security</span>
                ನಿಮ್ಮ ಡೇಟಾ ಸುರಕ್ಷಿತವಾಗಿದೆ. ನೋಂದಾಯಿಸುವ ಮೂಲಕ, ನೀವು ನಮ್ಮ <a class="underline font-bold text-primary" href="#">ಗೌಪ್ಯತಾ ನೀತಿ</a> ಮತ್ತು <a class="underline font-bold text-primary" href="#">ನಿಯಮಗಳನ್ನು</a> ಒಪ್ಪುತ್ತೀರಿ.
            </p>
</div>
</main>
